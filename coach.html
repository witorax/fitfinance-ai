<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aiden - FitFinance AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="/icons/favicon-16.png" sizes="16x16" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#0a0c14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitFinance" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>🤖 Aiden</h1>
    <p class="subtitle">
      Aiden a acces (lecture/ecriture) a tes donnees sport, nutrition et finance. Tu peux lui demander par exemple :
      "Genere-moi un programme d'entrainement", "Planifie mes repas d'aujourd'hui",
      "Cree un objectif d'epargne de 5000$", "Resume mes finances du mois".
    </p>

    <div class="card">
      <div style="display:flex; justify-content:flex-end; margin-bottom:8px;">
        <button type="button" class="secondary" id="reset-chat-btn">🗑️ Nouvelle conversation</button>
      </div>
      <div class="chat-window" id="chat-window"></div>
      <div class="chat-input-row">
        <textarea id="chat-input" rows="2" placeholder="Ecris ton message..."></textarea>
        <button id="send-btn">Envoyer</button>
      </div>
      <p id="chat-error" class="error"></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/markdown.js"></script>
  <script>
    let userId, accessToken;
    const history = [];

    function appendMessage(role, content) {
      const win = document.getElementById("chat-window");
      const div = document.createElement("div");
      div.className = "chat-msg " + role;
      setMessageContent(div, role, content);
      win.appendChild(div);
      win.scrollTop = win.scrollHeight;
      return div;
    }

    function setMessageContent(div, role, content) {
      if (role === "assistant") {
        div.innerHTML = `<div class="markdown-content">${renderMarkdown(content)}</div>`;
      } else {
        div.textContent = content;
      }
    }

    async function loadHistory() {
      // On ne recharge que les echanges des dernieres 24h pour limiter le cout en tokens.
      // Le suivi a long terme (programmes, repas, finances, preferences...) est gere
      // directement dans Supabase et reste accessible a Aiden via ses outils.
      const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
      const { data } = await supabaseClient
        .from("ai_messages")
        .select("*")
        .eq("user_id", userId)
        .gte("created_at", since)
        .order("created_at", { ascending: true })
        .limit(50);

      (data || []).forEach(m => {
        appendMessage(m.role, m.content);
        history.push({ role: m.role, content: m.content });
      });
    }

    async function sendMessage() {
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text) return;

      const sendBtn = document.getElementById("send-btn");
      const errorEl = document.getElementById("chat-error");
      errorEl.textContent = "";

      appendMessage("user", text);
      history.push({ role: "user", content: text });
      input.value = "";
      sendBtn.disabled = true;

      const thinkingEl = document.createElement("div");
      thinkingEl.className = "chat-msg assistant";
      thinkingEl.textContent = "...";
      document.getElementById("chat-window").appendChild(thinkingEl);
      document.getElementById("chat-window").scrollTop = document.getElementById("chat-window").scrollHeight;

      try {
        const res = await fetch("/api/ai-chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${accessToken}`,
          },
          body: JSON.stringify({ messages: history }),
        });

        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody.error || `Erreur serveur (${res.status})`);
        }

        const data = await res.json();
        setMessageContent(thinkingEl, "assistant", data.reply);
        document.getElementById("chat-window").scrollTop = document.getElementById("chat-window").scrollHeight;
        history.push({ role: "assistant", content: data.reply });
      } catch (err) {
        thinkingEl.remove();
        errorEl.textContent = err.message;
        history.pop(); // retire le message user en cas d'echec pour pouvoir reessayer
      } finally {
        sendBtn.disabled = false;
      }
    }

    (async () => {
      const session = await requireAuthAndRenderNav("coach.html");
      if (!session) return;
      userId = session.user.id;
      accessToken = session.access_token;

      await loadHistory();

      // Resume hebdomadaire automatique : chaque dimanche, Aiden genere un bilan
      // de la semaine (une seule fois par semaine).
      try {
        const { data: prof } = await supabaseClient
          .from("profiles").select("last_weekly_summary").eq("id", userId).maybeSingle();
        const today = new Date();
        const todayStr = today.toISOString().slice(0, 10);
        const isSunday = today.getDay() === 0;
        const last = prof?.last_weekly_summary ? new Date(prof.last_weekly_summary) : null;
        const daysSinceLast = last ? Math.floor((today - last) / 86400000) : Infinity;
        if (isSunday && daysSinceLast >= 7) {
          await supabaseClient.from("profiles").update({ last_weekly_summary: todayStr }).eq("id", userId);
          document.getElementById("chat-input").value = "Fais-moi mon resume hebdomadaire complet.";
          sendMessage();
        }
      } catch (e) { /* colonne pas encore creee : ignorer */ }

      document.getElementById("send-btn").addEventListener("click", sendMessage);
      document.getElementById("chat-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      document.getElementById("reset-chat-btn").addEventListener("click", async () => {
        if (!confirm("Effacer l'historique de cette conversation avec Aiden ?")) return;
        await supabaseClient.from("ai_messages").delete().eq("user_id", userId);
        history.length = 0;
        document.getElementById("chat-window").innerHTML = "";
      });
    })();
  </script>
</body>
</html>
